{% extends "base.html" %}
{% block title %}포트폴리오 - Money Mani{% endblock %}
{% block content %}
<h1>포트폴리오</h1>

<article>
    <header>실시간 보유 현황</header>
    <button id="refresh-btn" onclick="refreshPortfolio()">새로고침 (KIS API)</button>
    <div id="refresh-status"></div>
    <div id="holdings-table"><p>로딩 중...</p></div>
</article>

<script>
function loadHoldings() {
    fetch('/api/portfolio/live')
        .then(r => r.json())
        .then(data => {
            const div = document.getElementById('holdings-table');
            if (!data.length) { div.innerHTML = '<p>보유 종목이 없습니다. 새로고침을 눌러주세요.</p>'; return; }
            let html = '<table><thead><tr><th>종목</th><th>이름</th><th>시장</th><th>수량</th><th>평균가</th><th>현재가</th><th>수익률</th></tr></thead><tbody>';
            data.forEach(h => {
                const cls = h.pnl_pct >= 0 ? 'signal-buy' : 'signal-sell';
                html += '<tr><td>' + h.ticker + '</td><td>' + (h.name||'') + '</td><td>' + h.market + '</td>'
                    + '<td>' + h.quantity + '</td><td>' + Number(h.avg_price).toLocaleString() + '</td>'
                    + '<td>' + Number(h.current_price).toLocaleString() + '</td>'
                    + '<td class="' + cls + '">' + h.pnl_pct.toFixed(2) + '%</td></tr>';
            });
            div.innerHTML = html + '</tbody></table>';
        });
}
loadHoldings();

function refreshPortfolio() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true; btn.textContent = '업데이트 중...';
    fetch('/api/portfolio/refresh', {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            document.getElementById('refresh-status').innerHTML = '<p>' + data.message + '</p>';
            setTimeout(loadHoldings, 3000);
        })
        .catch(err => {
            document.getElementById('refresh-status').innerHTML = '<p class="error">오류: ' + err.message + '</p>';
        })
        .finally(() => { btn.disabled = false; btn.textContent = '새로고침 (KIS API)'; });
}
</script>
{% endblock %}
