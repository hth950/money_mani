{% extends "base.html" %}
{% block title %}신호 이력 - Money Mani{% endblock %}
{% block content %}
<h1>신호 이력</h1>

<article>
    <header>필터</header>
    <div class="grid">
        <label>종목 코드 <input type="text" id="filter-ticker" placeholder="예: 005930"></label>
        <label>신호 타입
            <select id="filter-type">
                <option value="">전체</option>
                <option value="BUY">매수 (BUY)</option>
                <option value="SELL">매도 (SELL)</option>
            </select>
        </label>
        <label>시작일 <input type="date" id="filter-from"></label>
        <label>종료일 <input type="date" id="filter-to"></label>
    </div>
    <button onclick="loadSignals()">검색</button>
</article>

<div id="signals-table"><p>로딩 중...</p></div>

<script>
function loadSignals() {
    const params = new URLSearchParams();
    const ticker = document.getElementById('filter-ticker').value;
    const type = document.getElementById('filter-type').value;
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    if (ticker) params.set('ticker', ticker);
    if (type) params.set('signal_type', type);
    if (from) params.set('date_from', from);
    if (to) params.set('date_to', to);

    fetch('/api/signals?' + params.toString())
        .then(r => r.json())
        .then(data => {
            const div = document.getElementById('signals-table');
            if (!data.length) { div.innerHTML = '<p>신호 이력이 없습니다.</p>'; return; }
            let html = '<table><thead><tr><th>시간</th><th>전략</th><th>종목</th><th>이름</th><th>시장</th><th>신호</th><th>가격</th><th>출처</th></tr></thead><tbody>';
            data.forEach(s => {
                const cls = s.signal_type === 'BUY' ? 'signal-buy' : 'signal-sell';
                html += '<tr><td>' + (s.detected_at||'').substring(0,16) + '</td>'
                    + '<td>' + s.strategy_name + '</td><td>' + s.ticker + '</td>'
                    + '<td>' + (s.ticker_name||'') + '</td><td>' + s.market + '</td>'
                    + '<td class="' + cls + '">' + s.signal_type + '</td>'
                    + '<td>' + Number(s.price).toLocaleString() + '</td>'
                    + '<td>' + s.source + '</td></tr>';
            });
            div.innerHTML = html + '</tbody></table>';
        });
}
loadSignals();
</script>
{% endblock %}
