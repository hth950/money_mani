# Multi-layer scoring configuration
enabled: true
fallback_on_error: true

# Market-specific weight profiles
weights:
  KRX:
    technical: 0.50
    fundamental: 0.10
    flow: 0.20
    intel: 0.10
    macro: 0.10
  US:
    technical: 0.50
    fundamental: 0.10
    flow: 0.0
    intel: 0.25
    macro: 0.15

# Decision thresholds
thresholds:
  execute: 0.60
  watch: 0.40

# Transaction cost awareness
transaction_costs:
  KRX:
    round_trip_pct: 0.21    # 매수 0.015% + 매도 0.015% + 거래세 0.18%
    min_expected_return: 0.5  # 최소 기대수익률 0.5% (수수료의 ~2.4배 안전마진)
  US:
    round_trip_pct: 0.0
    min_expected_return: 0.0

# Ensemble diversity scoring
ensemble:
  use_diversity_scorer: true
  min_category_diversity: 3
  min_weighted_score: 3.0
  fallback_count: 7

# Sector-relative fundamental benchmarks
sector_benchmarks:
  enabled: true
  defaults:
    per: 20.0
    roe: 0.15
    pbr: 1.5
  sectors:
    Technology:
      per: 35.0
      roe: 0.25
      pbr: 3.0
    Financial Services:
      per: 12.0
      roe: 0.12
      pbr: 0.8
    Healthcare:
      per: 40.0
      roe: 0.20
      pbr: 4.0
    Consumer Cyclical:
      per: 20.0
      roe: 0.18
      pbr: 2.0
    Industrials:
      per: 18.0
      roe: 0.15
      pbr: 1.8
    Communication Services:
      per: 25.0
      roe: 0.20
      pbr: 2.5
    Consumer Defensive:
      per: 22.0
      roe: 0.18
      pbr: 2.2
    Energy:
      per: 12.0
      roe: 0.15
      pbr: 1.2
    Basic Materials:
      per: 15.0
      roe: 0.12
      pbr: 1.0
    Real Estate:
      per: 30.0
      roe: 0.08
      pbr: 1.5
    Utilities:
      per: 18.0
      roe: 0.10
      pbr: 1.3

# Exit/sell timing strategy
exit_strategy:
  enabled: true
  weights:
    trend: 0.35
    momentum: 0.30
    trailing_stop: 0.35
  thresholds:
    sell_execute: 0.25
    sell_watch: 0.40
  stop_loss_pct: -0.05
  take_profit_pct: 0.15
  atr_multiplier: 2.0
  min_holding_days: 2

macro:
  enabled: true
  vix_thresholds:
    low: 20.0
    high: 30.0
  scores:
    low: 0.7
    medium: 0.5
    high: 0.2

flow_scoring:
  enabled: true
  lookback_days: 14
  components:
    streak: 0.20
    amount: 0.35
    ratio: 0.25
    synergy: 0.20

dart_events:
  enabled: false   # 기본 비활성화, 안전 롤아웃
  poll_hour: 6     # 매일 06:00 KST 폴링
