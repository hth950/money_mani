python_cmd: "py -3.14"

schedule:
  daily_scan:
    cron: "0 8 * * mon-fri"   # 매일 08:00 KST (평일)
    timezone: "Asia/Seoul"
  research_refresh:
    cron: "0 22 * * sun"
    timezone: "Asia/Seoul"

backtest:
  default_period: "2013-01-01"
  initial_capital: 10000000
  commission_krx: 0.00105
  commission_us: 0.0
  slippage: 0.001
  validation_thresholds:
    min_sharpe: 0.1           # 10년 기간 현실적 기준 (0.7은 전략 전멸)
    max_drawdown: 0.55        # 10년간 COVID/2022 하락장 포함 현실적 MDD
    min_win_rate: 0.30        # 30% 이상 (단순 지표 전략 현실적 기준)
    min_trades: 10            # 최소 10회 거래
    min_return: 0.0           # 총 수익률 > 0%
    min_annual_trades: 3      # 연 3회 이상 (분기 1회, 중장기)
    min_avg_holding_days: 5   # 평균 5일 이상 보유 (단타 배제)
    min_ticker_pass_rate: 0.20  # 테스트 종목 20% 이상 통과
  revalidation_tickers:
    krx_top: 100
    us_top: 50

pipeline:
  research:
    max_videos_per_query: 15
    min_view_count: 10000
    subtitle_language: "ko"
    notebook_prefix: "StockResearch"
  backtest:
    default_period: "2013-01-01"
    initial_capital: 10000000
    commission_krx: 0.00105
    commission_us: 0.0
    slippage: 0.001
    validation_thresholds:
      min_sharpe: 0.7
      max_drawdown: 0.25
      min_win_rate: 0.40
      min_trades: 10
      min_return: 0.0
      min_annual_trades: 6
      min_avg_holding_days: 5
      min_ticker_pass_rate: 0.50
    revalidation_tickers:
      krx_top: 100
      us_top: 50
  targets:
    kospi_top: 30
    custom_tickers: ["005930", "000660", "035420", "035720", "051910"]
  us_targets:
    custom_tickers: ["AAPL", "MSFT", "GOOGL", "AMZN", "NVDA", "TSLA"]


llm:
  provider: "openrouter"  # "openrouter" | "openai_oauth"
  api_key: "${OPENROUTER_KEY}"
  default_model: "google/gemini-3.1-pro-preview"
  fast_model: "google/gemini-3-flash-preview"
  deep_model: "google/gemini-3.1-pro-preview"
  lite_model: "google/gemini-3.1-flash-lite-preview"
  max_tokens: 4096
  temperature: 0.3
  openai_oauth:
    default_model: "gpt-5.4-mini"
    fast_model: "gpt-5.4-mini"
    deep_model: "gpt-5.4-mini"
    lite_model: "gpt-5.4-mini"
    token_path: "~/.money_mani/openai_oauth_token.json"

notifications:
  discord:
    enabled: true
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender: "${EMAIL_SENDER}"
    password: "${EMAIL_APP_PASSWORD}"
    recipients: []

realtime:
  interval_seconds: 60
  warmup_bars: 60
  max_buffer_size: 200
  cooldown_minutes: 30
  consensus:
    threshold: 0.55
    hold_threshold: 0.50
    min_hold_minutes: 60
    urgent_threshold: 0.80
  watchlist:
    krx: ["005930", "000660", "035420", "035720", "051910"]
    us: ["AAPL", "MSFT", "GOOGL", "AMZN", "NVDA", "TSLA"]
  kis:
    api_key: "${KIS_API_KEY}"
    api_secret: "${KIS_API_SECRET}"
    account_number: "${KIS_ACCOUNT_NUMBER}"

market_intel:
  enabled: true
  max_tokens: 4096
  temperature: 0.2

naver:
  client_id: "${NAVER_CLIENT_ID}"
  client_secret: "${NAVER_CLIENT_SECRET}"

logging:
  level: "INFO"
  file: "output/logs/money_mani.log"
  max_size_mb: 50
  backup_count: 5
