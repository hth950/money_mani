name: 삼중 EMA 추세
description: EMA 5/20/60 정배열시 매수, 역배열시 매도. 단기-중기-장기 이동평균 정렬 전략
source: trend_following
category: crossover
status: archived
rules:
  entry:
  - condition: crossover
    indicator_a: EMA_5
    indicator_b: EMA_20
    direction: above
  - condition: threshold_compare
    indicator_a: EMA_20
    indicator_b: EMA_60
    direction: above
  exit:
  - condition: crossover
    indicator_a: EMA_5
    indicator_b: EMA_20
    direction: below
indicators:
- type: ema
  period: 5
  column: close
  output_name: EMA_5
- type: ema
  period: 20
  column: close
  output_name: EMA_20
- type: ema
  period: 60
  column: close
  output_name: EMA_60
parameters:
  position_size: 1.0
  stop_loss: 0.06
timeframe: 1d
backtest_results: {}
