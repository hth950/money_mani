name: MA 수렴 후 확산
description: MA5/10/20이 수렴(밴드 좁아짐) 후 상방 확산시 매수
source: classic_ta
category: volatility
status: validated
rules:
  entry:
  - condition: threshold
    indicator: MA_SPREAD
    direction: above
    value: 0
  - condition: threshold_compare
    indicator_a: SMA_5
    indicator_b: SMA_10
    direction: above
  - condition: threshold_compare
    indicator_a: SMA_10
    indicator_b: SMA_20
    direction: above
  exit:
  - condition: crossover
    indicator_a: SMA_5
    indicator_b: SMA_10
    direction: below
indicators:
- type: sma
  period: 5
  column: close
  output_name: SMA_5
- type: sma
  period: 10
  column: close
  output_name: SMA_10
- type: sma
  period: 20
  column: close
  output_name: SMA_20
parameters:
  position_size: 0.8
  stop_loss: 0.04
timeframe: "1d"
backtest_results: {}
