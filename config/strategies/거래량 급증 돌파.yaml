name: 거래량 급증 돌파
description: 20일 평균 거래량 대비 2배 이상 급증 + 가격 상승시 매수
source: volume_analysis
category: volume
status: rejected_v2
rules:
  entry:
  - condition: threshold
    indicator: VOL_RATIO
    direction: above
    value: 2.0
  - condition: threshold
    indicator: ROC_1
    direction: above
    value: 0
  exit:
  - condition: threshold
    indicator: RSI_14
    direction: above
    value: 75
indicators:
- type: sma
  period: 20
  column: volume
  output_name: VOL_SMA_20
- type: rsi
  period: 14
  column: close
  output_name: RSI_14
- type: roc
  period: 1
  column: close
  output_name: ROC_1
parameters:
  position_size: 0.5
  stop_loss: 0.04
  take_profit: 0.1
timeframe: 1d
backtest_results: {}
