name: 이중 이동평균 + RSI 필터
description: MA5 > MA20 골든크로스 + RSI 40~70 구간 필터로 과매수 진입 방지
source: composite
category: composite
status: archived
rules:
  entry:
  - condition: crossover
    indicator_a: SMA_5
    indicator_b: SMA_20
    direction: above
  - condition: threshold
    indicator: RSI_14
    direction: above
    value: 40
  - condition: threshold
    indicator: RSI_14
    direction: below
    value: 70
  exit:
  - condition: crossover
    indicator_a: SMA_5
    indicator_b: SMA_20
    direction: below
indicators:
- type: sma
  period: 5
  column: close
  output_name: SMA_5
- type: sma
  period: 20
  column: close
  output_name: SMA_20
- type: rsi
  period: 14
  column: close
  output_name: RSI_14
parameters:
  position_size: 1.0
  stop_loss: 0.05
timeframe: 1d
backtest_results: {}
