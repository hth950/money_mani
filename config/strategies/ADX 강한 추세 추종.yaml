name: ADX 강한 추세 추종
description: ADX 25 이상 강한 추세 + DI+ > DI-면 매수, ADX 하락시 청산
source: trend_following
category: trend
status: validated
rules:
  entry:
  - condition: threshold
    indicator: ADX_14
    direction: above
    value: 25
  - condition: threshold_compare
    indicator_a: DMP_14
    indicator_b: DMN_14
    direction: above
  exit:
  - condition: threshold
    indicator: ADX_14
    direction: below
    value: 20
indicators:
- type: adx
  period: 14
  column: close
  output_name: ADX_14
parameters:
  position_size: 1.0
  stop_loss: 0.08
backtest_results: {}
