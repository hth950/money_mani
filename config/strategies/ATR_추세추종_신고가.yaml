name: ATR 추세추종 신고가
description: 252일(1년) 신고가 돌파 매수 + ATR×10 트레일링 스탑 청산. Sharpe ~1.24, CAGR ~19.3%
source: research_validated
category: trend
status: draft
timeframe: 1d
markets:
- KRX
- US
indicators:
- type: highest
  column: High
  output_name: HIGH_252
  period: 252
- type: atr
  column: close
  output_name: ATR_14
  period: 14
- type: atr_stop
  column: close
  output_name: ATR_STOP_60
  period: 60
  atr_col: ATR_14
  multiplier: 10.0
rules:
  entry:
  - condition: threshold_compare
    indicator_a: Close
    indicator_b: HIGH_252
    direction: above
  exit:
  - condition: threshold_compare
    indicator_a: Close
    indicator_b: ATR_STOP_60
    direction: below
parameters:
  position_size: 0.9999
  stop_loss: 0.15
backtest_results: {}
