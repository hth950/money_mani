name: 갭 상승 매수
description: 전일 대비 2% 이상 갭 상승 시작시 모멘텀 매수, 당일 음봉 전환시 청산
source: day_trading
category: breakout
status: archived
rules:
  entry:
  - condition: threshold
    indicator: GAP_PCT
    direction: above
    value: 2.0
  exit:
  - condition: threshold
    indicator: ROC_1
    direction: below
    value: -1.0
indicators:
- type: roc
  period: 1
  column: open
  output_name: GAP_PCT
- type: roc
  period: 1
  column: close
  output_name: ROC_1
parameters:
  position_size: 0.3
  stop_loss: 0.03
  take_profit: 0.05
timeframe: 1d
backtest_results: {}
