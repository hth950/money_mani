name: VWAP 회귀
description: 가격이 VWAP 아래로 2% 이상 이탈시 매수, VWAP 복귀시 청산
source: institutional
category: mean_reversion
status: archived
rules:
  entry:
  - condition: threshold
    indicator: VWAP_DIST
    direction: below
    value: -2.0
  exit:
  - condition: threshold
    indicator: VWAP_DIST
    direction: above
    value: 0
indicators:
- type: vwap
  column: close
  output_name: VWAP
parameters:
  position_size: 0.7
  stop_loss: 0.04
  take_profit: 0.03
timeframe: 1d
backtest_results: {}
