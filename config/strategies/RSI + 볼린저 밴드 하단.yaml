name: RSI + 볼린저 밴드 하단
description: RSI 35 이하 + 볼린저 하단 터치시 매수 (이중 과매도 확인)
source: composite
category: mean_reversion
status: archived
rules:
  entry:
  - condition: threshold
    indicator: RSI_14
    direction: below
    value: 35
  - condition: threshold_compare
    indicator_a: Close
    indicator_b: BBL_20_2.0
    direction: below
  exit:
  - condition: threshold
    indicator: RSI_14
    direction: above
    value: 60
indicators:
- type: rsi
  period: 14
  column: close
  output_name: RSI_14
- type: bbands
  period: 20
  std: 2.0
  column: close
  output_name: BB_20
parameters:
  position_size: 0.8
  stop_loss: 0.04
  take_profit: 0.08
timeframe: 1d
backtest_results: {}
